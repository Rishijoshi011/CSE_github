<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping/To-Do List with AngularJS</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>    
</head>
<body ng-app="shoppingApp" ng-controller="ShoppingController">

    <h2>Shopping/To-Do List</h2>

    <input type="text" ng-model="newItem" placeholder="Add new item" />
    <button ng-click="addItem()">Add Item</button>

    <ul>
        <li ng-repeat="item in items">
            {{ item }}
            <button ng-click="removeItem($index)">Remove</button>
        </li>
    </ul>

    <script>
        var app = angular.module('shoppingApp', []);

        app.controller('ShoppingController', function($scope) {
            $scope.items = ['CPU', 'GPU', 'RAM'];

            $scope.addItem = function() {
                if ($scope.newItem) {
                    $scope.items.push($scope.newItem); 
                    $scope.newItem = ''; 
                }
            };

            $scope.removeItem = function(index) {
                $scope.items.splice(index, 1); 
            };
        });
    </script>

</body>
</html>
